<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Станция 1 · Бокарнея</title>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>
<body style="margin:0; overflow:hidden;">

<a-scene
  mindar-image="imageTargetSrc: ../targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <video id="plant-video"
      src="../videos/plant1.mp4"
      playsinline
      webkit-playsinline
      muted
      preload="auto">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0" id="target">
    <a-video src="#plant-video" width="1" height="0.5625" position="0 0 0"></a-video>
  </a-entity>
</a-scene>

<script>
  const target = document.querySelector('#target');
  const video  = document.querySelector('#plant-video');

  target.addEventListener('targetFound', () => {
    video.currentTime = 0;
    video.play().catch(() => {
      video.muted = true;
      video.play();
    });
  });

  target.addEventListener('targetLost', () => {
    video.pause();
  });
</script>
</body>
</html>
